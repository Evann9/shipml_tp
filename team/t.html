<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>서울 맛집 가이드</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; }
        .container { display: flex; gap: 20px; margin-top: 20px; width: 90%; max-width: 1000px; }
        
        /* 지도 영역 (간단하게 버튼으로 대체) */
        .map-area { flex: 1; background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .region-btn { padding: 10px 15px; margin: 5px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; transition: 0.3s; }
        .region-btn:hover { background: #ff7675; color: white; }

        /* 맛집 리스트 영역 */
        .list-area { flex: 1; background: white; padding: 20px; border-radius: 10px; min-height: 300px; }
        .restaurant-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .fav-btn { cursor: pointer; border: none; background: none; font-size: 1.2rem; }

        /* 즐겨찾기 섹션 */
        .favorites-section { width: 90%; max-width: 1000px; margin-top: 20px; background: #ffeaa7; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>📍 서울 지역별 맛집 찾기</h1>

    <div class="container">
        <div class="map-area">
            <h3>지역 선택</h3>
            <button class="region-btn" onclick="showRestaurants('강남구')">강남구</button>
            <button class="region-btn" onclick="showRestaurants('마포구')">마포구</button>
            <button class="region-btn" onclick="showRestaurants('종로구')">종로구</button>
        </div>

        <div class="list-area">
            <h3 id="region-title">지역을 선택해주세요</h3>
            <div id="restaurant-list"></div>
        </div>
    </div>

    <div class="favorites-section">
        <h3>⭐ 나의 즐겨찾기 맛집</h3>
        <div id="favorites-list"></div>
    </div>

    <script>
        // 임시 맛집 데이터
        const foodData = {
            "강남구": ["땀땀 (쌀국수)", "중앙해장 (해장국)", "구구당 (퓨전요리)"],
            "마포구": ["우동카덴 (우동)", "소이연남 (태국음식)", "을밀대 (냉면)"],
            "종로구": ["토속촌 (삼계탕)", "찬양집 (칼국수)", "이문설농탕 (설렁탕)"]
        };

        // 1. 맛집 목록 표시 함수
        function showRestaurants(region) {
            const listDiv = document.getElementById('restaurant-list');
            document.getElementById('region-title').innerText = `📍 ${region} 맛집`;
            listDiv.innerHTML = '';

            foodData[region].forEach(name => {
                const item = document.createElement('div');
                item.className = 'restaurant-item';
                item.innerHTML = `
                    <span>${name}</span>
                    <button class="fav-btn" onclick="addToFavorite('${name}')">🤍</button>
                `;
                listDiv.appendChild(item);
            });
        }

        // 2. 즐겨찾기 추가 함수 (localStorage 이용)
        function addToFavorite(name) {
            let favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
            
            if (!favorites.includes(name)) {
                favorites.push(name);
                localStorage.setItem('myFavs', JSON.stringify(favorites));
                alert(`${name}이(가) 즐겨찾기에 추가되었습니다!`);
                renderFavorites();
            } else {
                alert('이미 즐겨찾기에 있는 맛집입니다.');
            }
        }

        // 3. 즐겨찾기 화면 렌더링 함수
        function renderFavorites() {
            const favDiv = document.getElementById('favorites-list');
            const favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
            
            favDiv.innerHTML = favorites.length === 0 ? "비어 있습니다." : "";
            
            favorites.forEach(name => {
                const tag = document.createElement('span');
                tag.style.cssText = "display:inline-block; background:white; padding:5px 10px; margin:5px; border-radius:15px; font-size:0.9rem;";
                tag.innerHTML = `${name} <b style="cursor:pointer; color:red" onclick="removeFavorite('${name}')">×</b>`;
                favDiv.appendChild(tag);
            });
        }

        // 4. 즐겨찾기 삭제 함수
        function removeFavorite(name) {
            let favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
            favorites = favorites.filter(item => item !== name);
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            renderFavorites();
        }

        // 페이지 로드 시 즐겨찾기 불러오기
        window.onload = renderFavorites;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>서울 맛집 맵 (Interactive)</title>
    <style>
        :root { --main-color: #ff7675; --bg-color: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; background: var(--bg-color); margin: 0; padding: 20px; }
        
        .main-layout { display: flex; gap: 30px; width: 100%; max-width: 1200px; height: 90vh; }

        /* 1. 지도 영역 */
        .map-container { flex: 1.5; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; }
        svg { width: 100%; height: auto; max-height: 500px; }
        
        /* 구(district) 스타일 */
        .district { fill: #dfe6e9; stroke: #fff; stroke-width: 2; transition: all 0.3s; cursor: pointer; }
        .district:hover { fill: var(--main-color); filter: drop-shadow(0 0 5px rgba(0,0,0,0.2)); }
        .district.active { fill: #d63031; }

        /* 2. 맛집 리스트 사이드바 */
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .info-panel, .fav-panel { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow-y: auto; }
        .info-panel { flex: 2; }
        .fav-panel { flex: 1; background: #fff9f9; }

        .res-card { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .res-card:hover { background: #fff5f5; }
        .btn-fav { border: none; background: none; font-size: 1.4rem; cursor: pointer; }
        
        h2 { margin-top: 0; color: #2d3436; font-size: 1.2rem; border-left: 4px solid var(--main-color); padding-left: 10px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="map-container">
        <h2>서울 자치구 선택</h2>
        <svg viewBox="0 0 500 400">
            <path id="강남구" class="district" d="M300,300 L380,300 L360,380 L280,380 Z" />
            <text x="315" y="345" font-size="12" fill="#636e72">강남구</text>
            
            <path id="마포구" class="district" d="M100,200 L180,180 L160,250 L80,250 Z" />
            <text x="110" y="225" font-size="12" fill="#636e72">마포구</text>

            <path id="종로구" class="district" d="M220,100 L300,100 L280,170 L200,170 Z" />
            <text x="235" y="140" font-size="12" fill="#636e72">종로구</text>
        </svg>
        <p style="color: #636e72; font-size: 0.9rem;">지도에서 구를 클릭해보세요!</p>
    </div>

    <div class="sidebar">
        <div class="info-panel">
            <h2 id="selected-region">맛집 목록</h2>
            <div id="res-list">지역을 먼저 선택해주세요.</div>
        </div>
        
        <div class="fav-panel">
            <h2>⭐ 즐겨찾기</h2>
            <div id="fav-list"></div>
        </div>
    </div>
</div>

<script>
    const foodData = {
        "강남구": ["땀땀", "중앙해장", "구구당", "브루클린 더 버거 조인트"],
        "마포구": ["우동카덴", "소이연남", "을밀대", "어글리베이커리"],
        "종로구": ["토속촌", "찬양집", "이문설농탕", "밀양돼지국밥"]
    };

    // 1. 지도 클릭 이벤트 연결
    const districts = document.querySelectorAll('.district');
    districts.forEach(el => {
        el.addEventListener('click', function() {
            // 기존 active 제거 및 새로운 active 추가
            districts.forEach(d => d.classList.remove('active'));
            this.classList.add('active');
            
            showList(this.id);
        });
    });

    // 2. 맛집 리스트 출력
    function showList(region) {
        const listDiv = document.getElementById('res-list');
        document.getElementById('selected-region').innerText = `📍 ${region} 맛집`;
        listDiv.innerHTML = '';

        foodData[region].forEach(name => {
            const card = document.createElement('div');
            card.className = 'res-card';
            card.innerHTML = `
                <span>${name}</span>
                <button class="btn-fav" onclick="toggleFav('${name}')">🤍</button>
            `;
            listDiv.appendChild(card);
        });
    }

    // 3. 즐겨찾기 토글 (저장/삭제)
    function toggleFav(name) {
        let favs = JSON.parse(localStorage.getItem('seoulFavs')) || [];
        
        if (favs.includes(name)) {
            favs = favs.filter(f => f !== name);
            alert('즐겨찾기에서 삭제되었습니다.');
        } else {
            favs.push(name);
            alert('즐겨찾기에 추가되었습니다!');
        }
        
        localStorage.setItem('seoulFavs', JSON.stringify(favs));
        renderFavs();
    }

    // 4. 즐겨찾기 렌더링
    function renderFavs() {
        const favDiv = document.getElementById('fav-list');
        const favs = JSON.parse(localStorage.getItem('seoulFavs')) || [];
        
        favDiv.innerHTML = favs.length ? '' : '<p style="font-size:0.8rem; color:gray;">찜한 맛집이 없어요.</p>';
        favs.forEach(name => {
            const tag = document.createElement('div');
            tag.style.cssText = "display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem;";
            tag.innerHTML = `<span>🍴 ${name}</span> <span style="cursor:pointer; color:red;" onclick="toggleFav('${name}')">삭제</span>`;
            favDiv.appendChild(tag);
        });
    }

    // 초기화
    window.onload = renderFavs;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
--- 변수 ---<br>
<script type="text/javascript">
// var aa; : 전통적인 방식의 변수 선언 방식  
let aa;  // 모던한 변수 선언    /*  여러줄 주석 */
aa = 100;
let bb = 20.5;
const cc = 300; // 상수로 선언 (고정된 값. 변경 불가)
bb = bb + 10;
// cc = cc + 10 > err : 수정 불가
let dd = false;  // boolean 값 출력
let msg = '변수 선언 이해'
document.write(aa,' ', bb, ' ',cc, ' ' ,dd,' ', msg);
document.write("<hr>");
document.write("type 확인 : ", typeof(1), ' ', typeof(-1.5), ' ',typeof('안녕'), ' ', typeof(true), ' ',typeof(null), ' ',typeof(undefined));
{   // 영역 확보
    let v1 = 1;   // 지역 변수     // var v1 = 1; 전역 변수
    document.write("<br>",v1);
    {
        let v2 = 2;
        document.write("<br>",v2);
        {
            let v3 = 3;
            document.write("<br>",v3);
            document.write("<br>",v1, ' ',v2,' ' ,v3);
        }
    }
}
document.write("<br>",v1, ' ',v2,' ' ,v3);
// err : 영역 밖 참조는 안됨.
</script>

<br><br>--- 연산자 ---
<script>
let x = 5, y =2;  // , 로 여러개 선언 가능함
document.write('<br>', x, ' ', y);
document.write('<br>산술 연산 : ', x + y, ' ', x/y, ' ', x % y);
document.write('<br>관계(비교) 연산 : ', x > y, ' ', x <= y, ' ', x == y, ' ', x != y);
document.write('<br>논리 연산(&&: and ,  ||: or) : ', x > y && x <= y, ' ', x > y || x <= y );
document.write('<br>누적 연산 : ', x = x + y, ' ' , ++x, ' ' , x += 1);   // 앞 세개의 연산은 같은 연산방식
document.write('<br>삼항 연산 : ', (x > y)?1000:1000+2000);  // 조건이 참이면 ? 다음 실행, 거짓이면 : 다음 실행
// 연산자 우선 순위는 python와 동일

document.write('<br>','a' + 'b' + 'c')  // 문자열 더하기

let m, b, c;
m = b = c = 6 + 5  // 할당 연산 체이닝
document.write('<br>', m, ' ', b, ' ', c)

</script>
</body>
</html>

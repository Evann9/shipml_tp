<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIS 선박 예측 지도</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/leaflet/leaflet.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-stage">
        <div id="map"></div>
        <div class="toolbar" aria-label="지도 필터">
          <label>
            <span>예측 선종</span>
            <select id="shipTypeSelect"></select>
          </label>
          <label>
            <span>예측 항로 패턴</span>
            <select id="routeSelect"></select>
          </label>
          <label class="toggle">
            <input type="checkbox" id="anomalyOnly" />
            <span>이상 항로만</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="trackToggle" />
            <span>실제 AIS 항적</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="futureToggle" />
            <span>미래 예측 경로</span>
          </label>
        </div>
        <div class="legend" aria-label="지도 범례">
          <div class="legend-row">
            <span class="legend-ship"></span>
            <span>일반 선박</span>
          </div>
          <div class="legend-row">
            <span class="legend-ship is-anomaly"></span>
            <span>이상 항로 선박</span>
          </div>
          <div class="legend-row">
            <span class="legend-line route"></span>
            <span>예측 항로 패턴</span>
          </div>
          <div class="legend-row">
            <span class="legend-line track"></span>
            <span>실제 AIS 항적</span>
          </div>
          <div class="legend-row">
            <span class="legend-line future"></span>
            <span>미래 예측 경로</span>
          </div>
        </div>
        <aside class="panel" aria-label="요약">
          <section class="panel-section">
            <h2>데이터 요약</h2>
            <div class="metric-grid compact">
              <div>
                <span class="metric-label">필터 결과</span>
                <strong id="shipCount">0</strong>
              </div>
              <div>
                <span class="metric-label">지도 표시</span>
                <strong id="shownShipCount">0</strong>
              </div>
            </div>
          </section>
          <section class="panel-section">
            <h2>선종 모델</h2>
            <div class="metric-grid">
              <div>
                <span class="metric-label">모델</span>
                <strong id="modelName">-</strong>
              </div>
              <div>
                <span class="metric-label">Accuracy</span>
                <strong id="modelAccuracy">-</strong>
              </div>
              <div>
                <span class="metric-label">Macro F1</span>
                <strong id="modelMacroF1">-</strong>
              </div>
              <div>
                <span class="metric-label">평가 방식</span>
                <strong id="modelMethod">-</strong>
              </div>
            </div>
            <div class="model-note" id="modelNote">-</div>
            <div class="model-note" id="futureModelNote">-</div>
          </section>
          <section class="panel-section">
            <h2>선종별 성능</h2>
            <div class="performance-list" id="performanceList"></div>
          </section>
          <section class="panel-section">
            <h2>주요 혼동</h2>
            <div class="confusion-list" id="confusionList"></div>
          </section>
          <section class="panel-section">
            <h2>예측 항로 패턴</h2>
            <div class="route-list" id="routeList"></div>
          </section>
        </aside>
      </section>
    </main>
    <script src="{{ url_for('static', filename='vendor/leaflet/leaflet.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>

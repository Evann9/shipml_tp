<!DOCTYPE html>

조건 판단문 : if <br>
<script>
// let ave = prompt("평균점수 입력:", '80')  // python의 input과 비슷함
// document.write('ave : ', ave);
let ave = 85;
if (ave >= 90) 
    document.write('점수 : '+ ave + "이므로 <b style='color:blue'>우수</b>");
else if (ave >= 70) {
    // 수행할 명령문이 복수일 경우 중괄호 안에 적음
    document.write('점수 : '+ ave + "이므로 <b style='color:red'>보통</b>");
    document.write('&nbsp;&nbsp;와우')
}
else 
    document.write('점수 : '+ ave + "이므로 <b style='color:blue'>저조</b>")
</script>

<br>조건 판단문 : swich<br>
<script>
let result = "D"    // 학점 기억 변수

switch(result){
    case "A": {  
        // java script는 사용 범위를 중괄호의 사용으로 결정함
        document.write('매우 우수');
        document.write('good');
        break;
    }
    case "B": document.write('우수'); break;
    case "C": document.write('보통'); break;
    // case "D": document.write('저조'); break;
    case 'D':
    case "F": document.write('불량'); break; 
    default:document.write('기타');
}
</script>
</body>
</html>
